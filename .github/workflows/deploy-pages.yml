# Pushes the Vite build to the orphan branch `gh-pages`.
#
# GitHub: Settings → Pages → Build and deployment → Source:
#   "Deploy from a branch" → Branch: gh-pages → folder: / (root)
#
# (Do NOT use "main" / repo root — that serves unbuilt index.html + /src/main.jsx, which stays blank.)
name: Deploy site to gh-pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - run: npm ci
      - run: npm run build

      # Uses Node 24 runtime (peaceiris v4 still targets Node 20 and triggers deprecation warnings.)
      - name: Publish to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          single-commit: true
