# Pushes the Vite build to the orphan branch `gh-pages`.
#
# GitHub: Settings → Pages → Build and deployment → Source:
#   "Deploy from a branch" → Branch: gh-pages → folder: / (root)
#
# (Do NOT use "main" / repo root — that serves unbuilt index.html + /src/main.jsx, which stays blank.)
name: Deploy site to gh-pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Use Node 24 for JS-based actions (checkout, setup-node, peaceiris) — Node 20 runner deprecation.
    # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
