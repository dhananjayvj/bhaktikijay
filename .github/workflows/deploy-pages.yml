# Official GitHub Pages flow: build → upload artifact → deploy-pages (Node 24 in v5).
#
# Settings → Pages → Source: GitHub Actions (not "Deploy from a branch").
# If you previously used the gh-pages branch + James Ives, switch Pages source
# to GitHub Actions only — one publishing method avoids duplicate/confusing runs.
#
# https://docs.github.com/en/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site
name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - run: npm ci
      - run: npm run build

      # v4: include dotfiles so dist/.nojekyll is published (Jekyll bypass on Pages).
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
