# Pushes ONLY npm run build output to branch `gh-pages` (orphan, single commit).
#
# GitHub Pages must publish THAT branch — not `main`.
#   Settings → Pages → Build and deployment → Deploy from a branch
#   → Branch: gh-pages → Folder: / (root)
#
# If Pages is set to "main" / (root), the live site will serve the Vite *source*
# index.html (<script src="/src/main.jsx">) and the app will be blank — built
# assets live under /assets/ only after `vite build` in dist/.
name: Deploy site to gh-pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Verify dist is a production build (not dev index.html)
        run: |
          test -f dist/index.html
          grep -qE '/assets/[^"]+\.js' dist/index.html || { echo "dist/index.html must load hashed JS from /assets/"; exit 1; }
          if grep -q '/src/main\.jsx' dist/index.html; then
            echo "dist/index.html still references dev /src/main.jsx — build is wrong"
            exit 1
          fi

      - name: Publish dist to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          single-commit: true
