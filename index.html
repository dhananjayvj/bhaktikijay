<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhakti & Dhananjay | Feb 2027</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #fff5f5; color: #4a4a4a; }
        .container { padding: 50px 20px; }
        h1 { color: #d63384; font-size: 2.5rem; }
        #countdown { font-size: 1.5rem; font-weight: bold; margin: 20px 0; color: #333; }
        .venue-btn { background: #d63384; color: white; padding: 15px 30px; text-decoration: none; border-radius: 25px; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bhakti & Dhananjay</h1>
        <p>A Merger of Tech & Tradition</p>
        <div id="countdown">Loading Countdown...</div>
        <p>Kanakapura Road, Bengaluru | February 2027</p>
        <a href="https://maps.google.com" class="venue-btn">Navigate to Venue</a>
    </div>

    <script>
        const weddingDate = new Date("Feb 14, 2027 09:00:00").getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const diff = weddingDate - now;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("countdown").innerHTML = days + " Days " + hours + " Hours to go!";
        }, 1000);
    </script>
</body>
</html>
